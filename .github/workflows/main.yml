name: Update Magic Formula Rankings

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Model Generator
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python backend/Model_Generator.py

      - name: Commit and push updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if there are changes
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add -A
          git commit -m "🔄 Auto-update Magic Formula results"

          # Rebase in case of concurrent updates
          git pull --rebase

          # Push to the currently checked out branch
          git push origin HEAD